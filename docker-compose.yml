services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - db-data:/app
    environment:
      - DATABASE_URL=sqlite:///./skills.db
      - SECRET_KEY=change-me-in-production
      - CORS_ORIGINS=["http://localhost","http://localhost:3000"]

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db-data:
